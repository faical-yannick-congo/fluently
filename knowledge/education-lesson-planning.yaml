id: lesson-planning
version: "1.0.0"
contributor: "Rick Dakan & Joseph Feller / Anthropic"
title: "AI-Assisted Lesson Planning for Educators"
domain: education
dimensions:
  delegation:
    description: "Identify which lesson planning elements AI can accelerate versus which require the teacher's direct professional judgment. AI handles well: generating activity ideas, drafting discussion questions, suggesting differentiation strategies, proposing assessment rubrics, and creating example problems. Teachers must retain: selecting content aligned to standards, setting the pedagogical arc across a unit, understanding individual student needs, and making final instructional decisions."
    example: A 7th-grade science teacher asks AI to generate five hands-on activity ideas for a lesson on cellular respiration at a middle school level, then selects the one that fits her lab budget and her students' prior knowledge, adapts it to her pacing, and writes her own formative assessment questions.
    antipattern: Pasting an AI-generated full lesson plan directly into the school's curriculum system without reviewing it for standard alignment, age appropriateness, or fit with the specific class's learning trajectory — treating AI as a replacement for pedagogical expertise rather than a brainstorming assistant.
  description:
    description: "Provide AI with specific instructional context: subject and grade level, concrete learning objectives tied to standards, the students' current skill level and prior knowledge, the available time and resources, the preferred pedagogical approach, and any accessibility or differentiation needs. Generic requests produce generic plans."
    example: "Prompt: 'Help me plan a 50-minute 8th-grade ELA lesson on identifying unreliable narrators. Students have read chapters 1-5 of The Outsiders. Objective: students can cite textual evidence to explain how Ponyboy's perspective limits the reader's understanding of events. Pedagogy: discussion-based with a short collaborative activity. Class includes 3 ELL students and 2 students with reading IEPs.'"
    antipattern: "Prompting: 'Write a lesson plan about unreliable narrators for middle school.' This produces a generic template disconnected from the specific text students are reading, the actual learning objective, the class's composition, and the teacher's instructional context."
  discernment:
    description: Evaluate AI-generated lesson plans and activities critically before adopting them. Check standard alignment, age appropriateness of content and vocabulary, timing realism, whether suggested activities match your students' actual readiness, and whether the pedagogical sequence makes instructional sense. AI does not know your students; you do.
    example: A teacher reviews an AI-generated lesson plan and notices the suggested 'exit ticket' question requires inferential reasoning two grade levels above her current class's demonstrated ability. She replaces it with a scaffolded sentence-starter version that matches where her students actually are.
    antipattern: Implementing AI-suggested activities without mentally simulating how your specific students will respond — discovering mid-lesson that the activity assumes prior knowledge students don't have, or that the timing estimate was wildly optimistic for the class's working pace.
  diligence:
    description: Maintain professional responsibility for every lesson you deliver. Verify that AI-suggested content is factually accurate, that activities are safe and appropriate for your students, and that lesson plans meet the curricular standards your students are accountable for. Your professional judgment is the final quality gate, not the AI.
    example: An educator uses AI-generated lesson scaffolding as a starting framework, then personally verifies that all factual content aligns with state science standards, removes an activity that requires materials not available in her classroom, and adds a culturally responsive example relevant to her students' community.
    antipattern: Delivering an AI-generated lesson that contains a factual error (e.g., an incorrect historical date or a flawed science explanation) because the teacher assumed the AI's content was accurate and did not independently verify it before presenting it to students.
score_hints:
  delegation: 0.25
  description: 0.30
  discernment: 0.25
  diligence: 0.20
tags:
  - education
  - lesson-planning
  - pedagogy
  - curriculum
reference: "https://aifluencyframework.org"

collaboration:
  pattern: linear
  description: "Teacher delegates lesson scaffolding, provides class context and learning objective, evaluates the AI plan, then uses it in class — single pass per lesson."
  sequence:
    - step: 1
      d: delegation
      label: "Define AI's lesson design role"
      example_prompts:
        - speaker: human
          text: "Draft a 45-minute lesson plan on photosynthesis for 8th graders. You propose the activities."
        - speaker: ai
          text: "Should I include a hands-on activity or keep it lecture and discussion?"
        - speaker: human
          text: "Include one hands-on activity — the class has lab access."
      triggers_next: "AI's design role and activity type agreed."
    - step: 2
      d: description
      label: "Provide class context and objectives"
      example_prompts:
        - speaker: human
          text: "Class of 28 students, mixed ability. Objective: understand the light-dependent reactions. Prior knowledge: cell structure."
        - speaker: ai
          text: "Any students with specific accessibility needs I should account for?"
        - speaker: human
          text: "One student uses screen-reader-compatible materials — flag anything visual-only."
      triggers_next: "AI has class profile, objective, and accessibility constraints."
    - step: 3
      d: discernment
      label: "Evaluate lesson plan quality"
      example_prompts:
        - speaker: human
          text: "The lab activity takes 20 minutes but the setup alone is 10 — tighten it."
        - speaker: ai
          text: "I can use a pre-setup version with materials already in place. Reduces activity time to 12 minutes."
        - speaker: human
          text: "Good — and flag the visual diagram for accessibility adaptation."
      triggers_next: "Lesson plan validated for timing and inclusivity."
    - step: 4
      d: diligence
      label: "Approve and deliver"
      example_prompts:
        - speaker: human
          text: "Head of department reviews lesson plan — approved."
        - speaker: human
          text: "Noting AI-drafted plan in the lesson record for reflection."
      triggers_next: "Lesson delivered. New lesson requires a fresh cycle."
  transitions:
    - from: delegation
      to: description
      trigger: "Design role and activity type agreed."
    - from: description
      to: discernment
      trigger: "AI delivers lesson plan."
    - from: discernment
      to: diligence
      trigger: "Plan validated."
    - from: diligence
      to: delegation
      trigger: "New lesson — fresh cycle."
      is_cycle_restart: true
