id: research-data-analysis
version: "1.0.0"
contributor: "Rick Dakan & Joseph Feller / Anthropic"
title: "Research Paper Data Analysis with AI"
domain: research
dimensions:
  delegation:
    description: Divide analytical work deliberately between human scholarly judgment and AI computation. AI handles pattern recognition in large datasets, running descriptive statistics, flagging outliers, generating visualization suggestions, and summarizing distributions. The researcher formulates hypotheses, interprets findings in disciplinary context, makes causal claims, and draws conclusions — these require domain expertise that AI cannot reliably supply.
    example: A social scientist delegates to AI the task of computing correlation matrices across 47 variables in a survey dataset and generating a ranked list of significant correlations. She then applies her theoretical knowledge to determine which correlations are substantively meaningful versus statistically coincidental.
    antipattern: Asking AI to not only run analysis but to formulate the research hypotheses, interpret what findings mean for the field, and draw conclusions — treating the model as a substitute for the researcher's own disciplinary expertise and scholarly judgment.
  description:
    description: Give AI precise methodological context — your research question, the dataset structure, units of measurement, required statistical methods, software environment, and any domain-specific constraints. Ambiguous instructions produce analysis that may be technically correct but methodologically wrong for your research design.
    example: "Prompt: 'Analyze this CSV of longitudinal student performance data (n=312, 4 time points). Variables: test_score (0-100), SES_quartile (1-4), intervention_group (binary), school_id (cluster variable). Run a mixed-effects linear regression predicting test_score from intervention_group, controlling for SES_quartile, with school_id as a random effect. Report coefficients, standard errors, and interpret the intervention effect size.'"
    antipattern: "Prompting: 'Analyze my research data and tell me what's significant.' Without specifying the research question, the correct statistical model, variable types, or analytical constraints, AI may apply an inappropriate method (e.g., OLS on clustered data) that produces misleading results."
  discernment:
    description: Rigorously verify AI-produced analysis before incorporating it into research. Check that statistical methods are appropriate for your data structure, that calculations are correct, that effect sizes are interpreted accurately, and that the AI has not made assumptions that violate your study design. AI can produce plausible-looking but methodologically flawed analysis.
    example: A researcher notices that AI-generated regression output reports a significant p-value but has failed to account for the clustered sampling structure, inflating the precision of estimates. She reruns the analysis herself with correct standard errors and finds the effect is no longer significant at her threshold.
    antipattern: Inserting AI-generated statistical tables and interpretive text directly into a manuscript without independently verifying the calculations, checking model assumptions, or confirming that the chosen method is appropriate for the study design — risking publication of flawed findings.
  diligence:
    description: Be transparent about AI's role in your analytical workflow per your institution's and journal's policies. Ensure all claims in the final paper reflect your own validated analysis. Maintain full methodological accountability — if AI analysis is used, you must understand it well enough to defend every number in peer review.
    example: A research team documents in their methods section that AI-assisted tools were used for initial descriptive analysis and outlier detection, while all inferential statistics were conducted and verified by the authors using R. They retain full analytical scripts for reproducibility review.
    antipattern: Publishing a paper that includes AI-generated statistical analysis without independent verification, failing to disclose AI assistance in violation of journal policy, or being unable to explain or reproduce the reported numbers during peer review.
score_hints:
  delegation: 0.20
  description: 0.25
  discernment: 0.35
  diligence: 0.20
tags:
  - research
  - data-analysis
  - statistics
  - academic
reference: "https://aifluencyframework.org"

collaboration:
  pattern: linear_with_loops
  description: "Researcher delegates analysis scope, provides dataset and hypotheses, evaluates AI findings for statistical validity, then reports — looping back to description if data quality issues emerge."
  sequence:
    - step: 1
      d: delegation
      label: "Agree on analysis scope and AI autonomy"
      example_prompts:
        - speaker: human
          text: "Analyze this survey dataset for correlations between feature usage and retention. Can you decide which statistical tests to run?"
        - speaker: ai
          text: "I can select appropriate tests given the distribution. Should I flag non-significant results or only report significant ones?"
        - speaker: human
          text: "Flag all results — I want the full picture, not just the highlights."
      triggers_next: "Analysis scope and reporting rule agreed."
    - step: 2
      d: description
      label: "Provide dataset and hypotheses"
      example_prompts:
        - speaker: human
          text: "Here's the dataset. Hypothesis: users who use feature X in the first week have higher 90-day retention."
        - speaker: ai
          text: "The dataset has 12% missing values in the retention column — how should I handle them?"
        - speaker: human
          text: "Exclude records with missing retention data and note the exclusion count."
      triggers_next: "AI has clean dataset, hypotheses, and data handling rules."
    - step: 3
      d: discernment
      label: "Evaluate analysis findings"
      example_prompts:
        - speaker: human
          text: "The correlation coefficient looks high — is this sample size large enough for that claim?"
        - speaker: ai
          text: "N=340 gives 80% power for this effect size. The result is statistically robust."
        - speaker: human
          text: "Good. Flag finding 3 as exploratory — the sample for that subgroup is only N=28."
      triggers_next: "Findings validated for statistical robustness and appropriate caveats added."
      loop_back:
        to: description
        condition: "Data quality issues (e.g., sampling bias, large missing data) undermine the analysis."
        reason: "Dataset needs cleaning or re-scoping before analysis is meaningful."
    - step: 4
      d: diligence
      label: "Review, document, and report"
      example_prompts:
        - speaker: human
          text: "Senior analyst peer-reviews the methodology section before publication."
        - speaker: human
          text: "Documenting which tests were AI-selected and which were human-specified in the methods section."
      triggers_next: "Report approved and methodology documented. Cycle restarts for next analysis."
      can_restart: true
  transitions:
    - from: delegation
      to: description
      trigger: "Analysis scope and reporting rules agreed."
    - from: description
      to: discernment
      trigger: "AI delivers analysis results."
    - from: discernment
      to: diligence
      trigger: "Findings validated."
    - from: discernment
      to: description
      trigger: "Data quality issues require dataset revision."
      is_loop_back: true
    - from: diligence
      to: delegation
      trigger: "Next research question — restart."
      is_cycle_restart: true
